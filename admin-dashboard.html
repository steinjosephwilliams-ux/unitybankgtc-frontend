<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add this line -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityBankGTC - Login</title>
    <!-- Your existing CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #6B7280;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        .admin-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #E5E7EB;
        }
        .admin-table th {
            background: #F9FAFB;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-small {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn-freeze { background: #FEF3C7; color: #92400E; }
        .btn-edit { background: #DBEAFE; color: #1E40AF; }
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #E5E7EB;
        }
        .tab-btn {
            padding: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #6B7280;
        }
        .tab-btn.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">UnityBankGTC</div>
            <nav>
                <a href="admin-dashboard.html" class="nav-item active">📊 Admin Dashboard</a>
                <a href="#" class="nav-item" onclick="AuthAPI.logout(); return false;">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Admin Dashboard</h1>
            
            <!-- Stats -->
            <div class="admin-grid">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <div class="stat-value" id="totalUsers">-</div>
                </div>
                <div class="stat-card">
                    <h3>Total Transactions</h3>
                    <div class="stat-value" id="totalTransactions">-</div>
                </div>
                <div class="stat-card">
                    <h3>Active Loans</h3>
                    <div class="stat-value" id="activeLoans">-</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Approvals</h3>
                    <div class="stat-value" id="pendingApprovals">-</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tab-nav">
                <button class="tab-btn active" onclick="showTab('users')">Users</button>
                <button class="tab-btn" onclick="showTab('transactions')">Transactions</button>
                <button class="tab-btn" onclick="showTab('loans')">Loan Approvals</button>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="tab-content">
                <div class="admin-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Account</th>
                                <th>Balance</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Transactions Tab -->
            <div id="transactionsTab" class="tab-content" style="display: none;">
                <div class="admin-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Loans Tab -->
            <div id="loansTab" class="tab-content" style="display: none;">
                <div class="admin-table">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Amount</th>
                                <th>Duration</th>
                                <th>Purpose</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="loansTable">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
