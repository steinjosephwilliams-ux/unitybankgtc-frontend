<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add this line -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityBankGTC - Login</title>
    <!-- Your existing CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .transactions-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .transaction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            border-bottom: 1px solid #E5E7EB;
        }
        .transaction-row:last-child {
            border-bottom: none;
        }
        .transaction-info h4 {
            margin-bottom: 0.25rem;
            color: var(--text-dark);
        }
        .transaction-info p {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .transaction-amount {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .credit { color: var(--success); }
        .debit { color: var(--error); }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 0.5rem;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">UnityBankGTC</div>
            <nav>
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="transactions.html" class="nav-item active">📊 Transactions</a>
                <a href="transfer.html" class="nav-item">💸 Transfer</a>
                <a href="loans.html" class="nav-item">💰 Loans</a>
                <a href="cards.html" class="nav-item">💳 Cards</a>
                <a href="profile.html" class="nav-item">👤 Profile</a>
                <a href="#" class="nav-item" onclick="AuthAPI.logout(); return false;">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Transaction History</h1>
            
            <div class="transactions-container">
                <div class="filter-bar">
                    <select id="filterType">
                        <option value="all">All Types</option>
                        <option value="credit">Received</option>
                        <option value="debit">Sent</option>
                    </select>
                    <input type="date" id="filterDate">
                    <button class="btn-primary" onclick="loadTransactions()" style="width: auto; padding: 0.5rem 1rem;">Filter</button>
                </div>
                
                <div id="transactionsList">
                    <p>Loading transactions...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
