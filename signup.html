<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add this line -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityBankGTC - Login</title>
    <!-- Your existing CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-section">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min 8 characters">
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="accountType">
                        <option value="savings">Savings</option>
                        <option value="checking">Checking</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Currency</label>
                    <select id="currency">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="NGN">NGN</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <p class="auth-link">Already have an account? <a href="index.html">Login</a></p>
            </form>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
