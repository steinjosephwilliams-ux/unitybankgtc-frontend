<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add this line -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityBankGTC - Login</title>
    <!-- Your existing CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .transfer-form {
            max-width: 500px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .balance-display {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            color: white;
            border-radius: 12px;
        }
        .balance-display h3 {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }
        .balance-amount {
            font-size: 2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">UnityBankGTC</div>
            <nav>
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="transactions.html" class="nav-item">📊 Transactions</a>
                <a href="transfer.html" class="nav-item active">💸 Transfer</a>
                <a href="loans.html" class="nav-item">💰 Loans</a>
                <a href="cards.html" class="nav-item">💳 Cards</a>
                <a href="profile.html" class="nav-item">👤 Profile</a>
                <a href="#" class="nav-item" onclick="AuthAPI.logout(); return false;">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Send Money</h1>
            
            <div class="balance-display">
                <h3>Available Balance</h3>
                <div class="balance-amount" id="availableBalance">$0.00</div>
            </div>

            <div class="transfer-form">
                <form id="transferForm">
                    <div class="form-group">
                        <label>Recipient Account Number</label>
                        <input type="text" id="recipientAccount" placeholder="GTC1234567" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="amount" placeholder="0.00" min="1" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <input type="text" id="description" placeholder="Payment for...">
                    </div>
                    
                    <button type="submit" class="btn-primary">Send Money</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/transfer.js"></script>
</body>
</html>
